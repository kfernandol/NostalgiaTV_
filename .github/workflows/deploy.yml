name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/nostalgia-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/nostalgia-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push WebApi
        uses: docker/build-push-action@v5
        with:
          context: ./WebApi
          file: ./WebApi/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push WebApp
        uses: docker/build-push-action@v5
        with:
          context: ./WebApp
          file: ./WebApp/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max