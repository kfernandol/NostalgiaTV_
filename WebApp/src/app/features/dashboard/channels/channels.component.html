<div
    [class.component-dark-theme]="themeService.isDark()"
    [class.card-borderd-theme]="themeService.isCardBorder()"
    [class.rtl-enabled]="themeService.isRTLEnabled()">

    <div class="breadcrumb-card mb-25 d-md-flex align-items-center justify-content-between">
        <h5 class="mb-0">Channels</h5>
        <button mat-flat-button color="primary" (click)="openForm()">
            <mat-icon>add</mat-icon> New Channel
        </button>
    </div>

    <mat-card class="daxa-card mb-25 border-radius bg-white border-none d-block">
        <mat-card-content>
            <div class="table-responsive">
                <table mat-table [dataSource]="dataSource">

                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef>#</th>
                        <td mat-cell *matCellDef="let c">{{ c.id }}</td>
                    </ng-container>

                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef>Name</th>
                        <td mat-cell *matCellDef="let c">{{ c.name }}</td>
                    </ng-container>

                    <ng-container matColumnDef="logo">
                        <th mat-header-cell *matHeaderCellDef>Logo</th>
                        <td mat-cell *matCellDef="let c">
                            @if (c.logoPath) {
                                <img [src]="apiUrl + c.logoPath" alt="logo" style="height:32px; border-radius:4px;">
                            } @else { <span>—</span> }
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="history">
                        <th mat-header-cell *matHeaderCellDef>History</th>
                        <td mat-cell *matCellDef="let c">
                            <span class="truncated-cell" [title]="c.history ?? ''">{{ c.history ?? '—' }}</span>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="startDate">
                        <th mat-header-cell *matHeaderCellDef>Start Date</th>
                        <td mat-cell *matCellDef="let c">{{ c.startDate | date:'mediumDate' }}</td>
                    </ng-container>

                    <ng-container matColumnDef="endDate">
                        <th mat-header-cell *matHeaderCellDef>End Date</th>
                        <td mat-cell *matCellDef="let c">{{ c.endDate ? (c.endDate | date:'mediumDate') : '—' }}</td>
                    </ng-container>

                    <ng-container matColumnDef="series">
                        <th mat-header-cell *matHeaderCellDef>Series</th>
                        <td mat-cell *matCellDef="let c">
                            <span class="truncated-cell" [title]="getSeriesNames(c.seriesIds)">{{ getSeriesNames(c.seriesIds) }}</span>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef>Actions</th>
                        <td mat-cell *matCellDef="let c">
                            <button mat-icon-button (click)="openForm(c)"><mat-icon>edit</mat-icon></button>
                            <button mat-icon-button color="primary" (click)="assignSeries(c)"><mat-icon>playlist_add</mat-icon></button>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
                    <tr class="mat-row" *matNoDataRow>
                        <td class="mat-cell" colspan="8">No channels found.</td>
                    </tr>
                </table>
            </div>
            <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
        </mat-card-content>
    </mat-card>
</div>
