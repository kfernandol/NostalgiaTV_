<div
    [class.component-dark-theme]="themeService.isDark()"
    [class.card-borderd-theme]="themeService.isCardBorder()"
    [class.rtl-enabled]="themeService.isRTLEnabled()"
>
    <div class="breadcrumb-card mb-25 d-md-flex align-items-center justify-content-between">
        <h5 class="mb-0">Series</h5>
        <button mat-flat-button color="primary" (click)="openForm()">
            <mat-icon>add</mat-icon> New Series
        </button>
    </div>

    <mat-card class="daxa-card mb-25 border-radius bg-white border-none d-block">
        <mat-card-content>
            <mat-table [dataSource]="series()">
                <ng-container matColumnDef="id">
                    <mat-header-cell *matHeaderCellDef>#</mat-header-cell>
                    <mat-cell *matCellDef="let s">{{ s.id }}</mat-cell>
                </ng-container>

                <ng-container matColumnDef="name">
                    <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
                    <mat-cell *matCellDef="let s">{{ s.name }}</mat-cell>
                </ng-container>

                <ng-container matColumnDef="description">
                    <mat-header-cell *matHeaderCellDef>Description</mat-header-cell>
                    <mat-cell *matCellDef="let s">{{ s.description ?? '—' }}</mat-cell>
                </ng-container>

                <ng-container matColumnDef="startDate">
                    <mat-header-cell *matHeaderCellDef>Start Date</mat-header-cell>
                    <mat-cell *matCellDef="let s">{{ s.startDate | date:'mediumDate' }}</mat-cell>
                </ng-container>

                <ng-container matColumnDef="endDate">
                    <mat-header-cell *matHeaderCellDef>End Date</mat-header-cell>
                    <mat-cell *matCellDef="let s">{{ s.endDate ? (s.endDate | date:'mediumDate') : '—' }}</mat-cell>
                </ng-container>

                <ng-container matColumnDef="rating">
                    <mat-header-cell *matHeaderCellDef>Rating</mat-header-cell>
                    <mat-cell *matCellDef="let s">{{ s.rating ?? '—' }}</mat-cell>
                </ng-container>

                <ng-container matColumnDef="categories">
                    <mat-header-cell *matHeaderCellDef>Categories</mat-header-cell>
                    <mat-cell *matCellDef="let s">{{ getCategoryNames(s.categoryIds) }}</mat-cell>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
                    <mat-cell *matCellDef="let s">
                        <button mat-icon-button (click)="openForm(s)">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="primary" (click)="assignCategories(s)">
                            <mat-icon>category</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" (click)="delete(s.id)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </mat-cell>
                </ng-container>

                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
            </mat-table>
        </mat-card-content>
    </mat-card>
</div>
