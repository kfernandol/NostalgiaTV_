@if (visible()) {
  <div class="retro-controls" [class.visible]="visible()">

    <button class="rc-btn" (click)="playPause.emit()"
      [tabindex]="isFullscreen() ? 1 : -1" aria-label="Play/Pausa">
      <mat-icon>{{ isPaused() ? 'play_arrow' : 'pause' }}</mat-icon>
    </button>

    <div class="rc-volume-wrap">
      <button class="rc-btn" (click)="toggleMute.emit()"
        [tabindex]="isFullscreen() ? 1 : -1" aria-label="Volumen">
        <mat-icon>{{
          isMuted() || volumeLevel() === 0 ? 'volume_off' :
          volumeLevel() < 0.5 ? 'volume_down' : 'volume_up'
        }}</mat-icon>
      </button>
      <div class="rc-volume-slider">
        <input type="range" min="0" max="1" step="0.05"
          [value]="isMuted() ? 0 : volumeLevel()"
          (input)="setVolume.emit(+$any($event.target).value)"
          [tabindex]="isFullscreen() ? 1 : -1"
          aria-label="Nivel de volumen"
        />
      </div>
    </div>

    @if (showProgress()) {
      <div class="rc-progress" (click)="seek.emit($event)"
        role="slider"
        [attr.aria-valuenow]="progressPercent()"
        aria-valuemin="0" aria-valuemax="100"
        [tabindex]="isFullscreen() ? 1 : -1"
        (keydown)="progressKeydown.emit($event)"
        aria-label="Progreso del video"
      >
        <div class="rc-track">
          <div class="rc-fill" [style.width.%]="progressPercent()"></div>
          <div class="rc-thumb" [style.left.%]="progressPercent()"></div>
        </div>
      </div>

      <span class="rc-time">{{ currentTimeFormatted() }} / {{ durationFormatted() }}</span>
    }

    @if (audioTracks().length > 1) {
      <select class="rc-select"
        (change)="setAudioTrack.emit(+$any($event.target).value)"
        [tabindex]="isFullscreen() ? 1 : -1"
        aria-label="Pista de audio"
      >
        @for (track of audioTracks(); track track; let i = $index) {
          <option [value]="i" [selected]="currentAudioTrack() === i">
            {{ getTrackLabel(track, i) }}
          </option>
        }
      </select>
    }

    <button class="rc-btn" (click)="toggleFullscreen.emit()"
      [tabindex]="isFullscreen() ? 1 : -1" aria-label="Pantalla completa">
      <mat-icon>{{ isFullscreen() ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
    </button>

  </div>
}
