<div class="remote-control" [class.remote-control--collapsed]="isCollapsed()">

  <div class="remote-header">
    <button mat-mini-fab (click)="goToLogin.emit()" matTooltip="Login">
      <mat-icon>person</mat-icon>
    </button>
    <h3>CONTROL</h3>
    <button mat-mini-fab (click)="openSettings.emit()" matTooltip="Configuración">
      <mat-icon>settings</mat-icon>
    </button>
  </div>

  <div class="remote-led"></div>
  <div class="remote-divider"></div>

  <div class="remote-always-visible">

    <!-- Botones de acción siempre visibles en mobile -->
    <div class="channel-top-actions">
      <button mat-stroked-button class="nav-btn"
        (click)="openSeries.emit()" [tabindex]="1">SERIES</button>
      <button mat-stroked-button class="nav-btn nav-btn--secondary"
        [disabled]="!hasChannel()"
        (click)="openSchedule.emit()" [tabindex]="1">PROG.</button>
      <button mat-stroked-button class="nav-btn nav-btn--secondary"
        (click)="openFilters.emit()" [tabindex]="1">FILTROS</button>
    </div>

    <!-- Media controls -->
    <div class="media-controls media-controls--inline">
      <button mat-icon-button (click)="toggleMute.emit()">
        <mat-icon>{{ isMuted() ? 'volume_off' : 'volume_mute' }}</mat-icon>
      </button>
      <button mat-icon-button (click)="volumeDown.emit()">
        <mat-icon>volume_down</mat-icon>
      </button>
      <button mat-icon-button (click)="volumeUp.emit()">
        <mat-icon>volume_up</mat-icon>
      </button>
      <button mat-icon-button (click)="toggleFullscreen.emit()">
        <mat-icon>fullscreen</mat-icon>
      </button>
    </div>

    <button class="remote-collapse-btn" (click)="toggleCollapse()">
      <mat-icon>{{ isCollapsed() ? 'expand_less' : 'expand_more' }}</mat-icon>
      <span>{{ isCollapsed() ? 'VER CANALES' : 'OCULTAR' }}</span>
    </button>

    </div>

    <!-- Era selection -->
    @if (hasChannel() && channelEras().length > 1) {
      <div class="era-selection">
        <span class="era-label">ERA:</span>
        @for (era of channelEras(); track era.id) {
          <button class="era-btn"
            [class.active]="selectedEraId() === era.id"
            (click)="selectEra.emit(era)">
            {{ era.name }}
          </button>
        }
      </div>
    }

    <!-- Colapsable -->
  <div class="remote-collapsible">

    <div class="channels-list">
      @for (channel of channels(); track channel.id; let i = $index) {
        <button class="channel-btn"
          [class.active]="currentChannelId() === channel.id"
          (click)="selectChannel.emit(channel)"
          [tabindex]="1"
          [attr.aria-label]="'Canal ' + (i + 1) + ': ' + channel.name"
        >
          @if (channel.logoPath) {
            <img [src]="apiUrl() + channel.logoPath" class="channel-logo" [alt]="channel.name" />
          }
          <div class="channel-info">
            <span class="channel-number">CH {{ i + 1 }}</span>
            <span class="channel-name">{{ channel.name }}</span>
          </div>
        </button>
      }
    </div>

    <!-- Solo desktop -->
    <div class="nav-controls desktop-nav" style="margin-top: 0.8rem">
      <button mat-stroked-button class="nav-btn"
        (click)="openSeries.emit()" [tabindex]="3">SERIES</button>
      <button mat-stroked-button class="nav-btn nav-btn--secondary"
        [disabled]="!hasChannel()"
        (click)="openSchedule.emit()" [tabindex]="3">PROGRAMACIÓN</button>
      <button mat-stroked-button class="nav-btn nav-btn--secondary"
        (click)="openFilters.emit()" [tabindex]="3">FILTROS</button>
    </div>

  </div>

  <!-- Footer solo desktop -->
  <div class="remote-footer">
    <div class="media-controls">
      <button mat-icon-button (click)="toggleMute.emit()" [tabindex]="2" aria-label="Silenciar">
        <mat-icon>{{ isMuted() ? 'volume_off' : 'volume_mute' }}</mat-icon>
      </button>
      <button mat-icon-button (click)="volumeDown.emit()" [tabindex]="2">
        <mat-icon>volume_down</mat-icon>
      </button>
      <button mat-icon-button (click)="volumeUp.emit()" [tabindex]="2">
        <mat-icon>volume_up</mat-icon>
      </button>
      <button mat-icon-button (click)="toggleFullscreen.emit()" [tabindex]="2">
        <mat-icon>fullscreen</mat-icon>
      </button>
    </div>
  </div>

</div>
