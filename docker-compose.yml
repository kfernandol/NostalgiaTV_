services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nostalgia-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - nostalgia-net
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10

  webapi:
    image: ghcr.io/${GITHUB_OWNER}/nostalgia-api:latest
    build:
      context: ./WebApi
      dockerfile: Dockerfile
    container_name: nostalgia-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

      # 1. Base de datos (usando el nombre del servicio 'sqlserver')
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=NostalgiaTV;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True

      # 2. CORS (Añadimos la IP pública y el puerto de tu WebApp)
      - Cors__AllowedOrigins__0=http://85.239.230.160:8082
      - Cors__AllowedOrigins__1=http://localhost:8082

      # 3. JWT (Opcional: puedes cambiarlos aquí si quieres otros valores en producción)
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=http://85.239.230.160:8081
      - Jwt__Audience=http://85.239.230.160:8081

      # 4. Rutas de Linux para FFmpeg y Archivos
      - FFmpeg__BinaryFolder=/usr/bin
      - MediaSettings__BasePath=/app/wwwroot/uploads
    ports:
      - "8080:8080"
    volumes:
      - media_files:/app/wwwroot/uploads/media
      - uploads:/app/wwwroot/uploads
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - nostalgia-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  webapp:
    image: ghcr.io/${GITHUB_OWNER}/nostalgia-web:latest
    build:
      context: ./WebApp
      dockerfile: Dockerfile
    container_name: nostalgia-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ${ENV_JS_PATH}:/usr/share/nginx/html/assets/env.js:ro
    depends_on:
      - webapi
    networks:
      - nostalgia-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: nostalgia-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: 60
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
    networks:
      - nostalgia-net

volumes:
  sqlserver_data:
  media_files:
  uploads:

networks:
  nostalgia-net:
    driver: bridge