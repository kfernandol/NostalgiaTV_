services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nostalgia-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - nostalgia-net
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10

  webapi:
    image: ghcr.io/${GITHUB_OWNER}/nostalgia-api:latest
    build:
      context: ./WebApi
      dockerfile: Dockerfile
    container_name: nostalgia-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=NostalgiaTV;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True"
      FFmpeg__BinaryFolder: /usr/bin
    ports:
      - "8080:8080"
    volumes:
      - media_files:/app/wwwroot/uploads/media
      - uploads:/app/wwwroot/uploads
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - nostalgia-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  webapp:
    image: ghcr.io/${GITHUB_OWNER}/nostalgia-web:latest
    build:
      context: ./WebApp
      dockerfile: Dockerfile
    container_name: nostalgia-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ${ENV_JS_PATH}:/usr/share/nginx/html/assets/env.js:ro
    depends_on:
      - webapi
    networks:
      - nostalgia-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: nostalgia-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: 60
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
    networks:
      - nostalgia-net

volumes:
  sqlserver_data:
  media_files:
  uploads:

networks:
  nostalgia-net:
    driver: bridge